<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dark background with rounded corners -->
  <rect width="32" height="32" rx="6" fill="#0c0b09"/>

  <!-- globe circle -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#C9B88A" stroke-width="1.3" opacity="0.75"/>

  <!-- equator -->
  <line x1="4" y1="16" x2="28" y2="16" stroke="#C9B88A" stroke-width="0.7" opacity="0.4"/>

  <!-- central meridian (vertical ellipse) -->
  <ellipse cx="16" cy="16" rx="5" ry="12" fill="none" stroke="#C9B88A" stroke-width="0.7" opacity="0.35"/>

  <!-- outer meridian ellipse -->
  <ellipse cx="16" cy="16" rx="10" ry="12" fill="none" stroke="#C9B88A" stroke-width="0.5" opacity="0.2"/>

  <!-- upper and lower parallels -->
  <line x1="5"  y1="10" x2="27" y2="10" stroke="#C9B88A" stroke-width="0.5" opacity="0.22"/>
  <line x1="5"  y1="22" x2="27" y2="22" stroke="#C9B88A" stroke-width="0.5" opacity="0.22"/>

  <!-- play triangle (centred slightly left so it reads well) -->
  <polygon points="11,11 11,21 23,16" fill="#C9B88A" opacity="0.92"/>
</svg>