<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <circle cx="32" cy="32" r="32" fill="#0D0D0D"/>

  <!-- outer globe ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#C9B88A" stroke-width="1.5"/>

  <!-- equator -->
  <ellipse cx="32" cy="32" rx="22" ry="8" fill="none" stroke="#C9B88A" stroke-width="1" opacity="0.5"/>

  <!-- upper latitude -->
  <ellipse cx="32" cy="21" rx="17" ry="6" fill="none" stroke="#C9B88A" stroke-width="0.8" opacity="0.35"/>

  <!-- lower latitude -->
  <ellipse cx="32" cy="43" rx="17" ry="6" fill="none" stroke="#C9B88A" stroke-width="0.8" opacity="0.35"/>

  <!-- vertical meridian -->
  <ellipse cx="32" cy="32" rx="8" ry="22" fill="none" stroke="#C9B88A" stroke-width="1" opacity="0.5"/>

  <!-- angled meridian -->
  <ellipse cx="32" cy="32" rx="8" ry="22" fill="none" stroke="#C9B88A" stroke-width="0.8" opacity="0.3" transform="rotate(60 32 32)"/>

  <!-- motion arc -->
  <path d="M 18 46 Q 28 12 46 22" fill="none" stroke="#C9B88A" stroke-width="2.5" stroke-linecap="round"/>

  <!-- arrowhead dot -->
  <circle cx="46" cy="22" r="3" fill="#C9B88A"/>

  <!-- origin dot -->
  <circle cx="18" cy="46" r="2" fill="#8B1A1A"/>
</svg>